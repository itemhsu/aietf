name: AlpacaBot Daily Workflow

on:
  schedule:
    # 台灣時間 06:00 = UTC 前一天 22:00（週日~週四）
    - cron: '0 22 * * 0-4'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '僅模擬不下單 (true/false)'
        required: false
        default: 'true'
      account_filter:
        description: '指定帳戶 ID（留空 = 全部帳戶）'
        required: false
        default: ''

jobs:
  run-all-accounts:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AlpacaBot (all accounts)
        env:
          ALPACA_KEY_A:    ${{ secrets.ALPACA_KEY_A }}
          ALPACA_SECRET_A: ${{ secrets.ALPACA_SECRET_A }}
          ALPACA_URL_A:    ${{ secrets.ALPACA_URL_A }}
          ALPACA_KEY_B:    ${{ secrets.ALPACA_KEY_B }}
          ALPACA_SECRET_B: ${{ secrets.ALPACA_SECRET_B }}
          ALPACA_URL_B:    ${{ secrets.ALPACA_URL_B }}
          EMAIL_USER:      ${{ secrets.EMAIL_USER }}
          EMAIL_PASS:      ${{ secrets.EMAIL_PASS }}
          DRY_RUN:         ${{ github.event.inputs.dry_run || 'false' }}
          ACCOUNT_FILTER:  ${{ github.event.inputs.account_filter || '' }}
        run: python main.py

      - name: Commit and push reports
        run: |
          git config user.name  "AlpacaBot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/ accounts/
          git diff --staged --quiet || \
            git commit -m "📊 Daily report $(date -u +%Y-%m-%d) [AlpacaBot]"
          git push

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alpacabot-log-${{ github.run_id }}
          path: '*.log'
          retention-days: 30

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ AlpacaBot 執行失敗：${new Date().toISOString().slice(0,10)}`,
              body: `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['automation-failure']
            })
